<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SMART - Sélection du Niveau</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="levels-body">
    <canvas id="canvas-bg"></canvas>

    <div class="map-container">
        <h1>SÉLECTION DE L'ÉTAPE</h1>
        
        <div class="world-map">
            <div class="path-line"></div>

            <a href="dashboard.html?level=1" class="level-node completed" data-title="Niveau 1" data-desc="Apprentissage à partir de zéro">
                <span class="node-icon">1</span>
                <div class="node-tooltip">Les premiers échecs</div>
            </a>

            <a href="dashboard.html?level=2" class="level-node active" data-title="Niveau 2" data-desc="Optimisation de l'équilibre">
                <span class="node-icon">2</span>
                <div class="node-tooltip">Tenir debout</div>
            </a>

            <a href="dashboard.html?level=3" class="level-node locked" data-title="Niveau 3" data-desc="Maîtrise de la marche">
                <span class="node-icon">🔒</span>
                <div class="node-tooltip">Marcher vers l'avant</div>
            </a>
            
            <a href="dashboard.html?level=4" class="level-node locked" data-title="Niveau 4" data-desc="Performance maximale">
                <span class="node-icon">🔒</span>
                <div class="node-tooltip">Optimisation finale</div>
            </a>
        </div>

        <div class="level-info-panel">
            <h2 id="selected-title">Choisissez une étape</h2>
            <p id="selected-desc">Cliquez sur un niveau pour analyser l'évolution du modèle PPO.</p>
        </div>
    </div>
    <h1>SÉLECTION DE L'ÉTAPE</h1>
        
        <div class="world-map">
            <div id="robot-character" class="robot-character">🤖</div>

            <div class="path-line"></div>

    <script src="particles.js"></script>
</body>
</html>
