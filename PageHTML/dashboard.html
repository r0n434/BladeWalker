<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SMART - Dashboard d'Évolution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <canvas id="canvas-bg"></canvas>

    <div class="split-container">
        <div class="video-side">
            <div class="video-wrapper">
                <video id="training-video" autoplay loop muted>
                    <source src="C:\Users\jerom\OneDrive\Images\exemple_interface.mp4" type="video/mp4">
                    Votre navigateur ne supporte pas la lecture de vidéos.
                </video>
                <div class="video-overlay">Étape : Apprentissage Initial</div>
            </div>
        </div>

<div class="text-side">
            <div class="content-text">
                <h2>Analyse de l'Apprentissage</h2>
                <hr>
                <div class="status-badge">Phase : Exploration (Échec)</div>
                
                <p>
                    À cette étape, l'IA utilise une <strong>distribution gaussienne</strong> pour tester des mouvements aléatoires.
                </p>

                <div class="parameters-section">
                    <h3>Ajustement de la Récompense</h3>
                    
                    <div class="parameter-group">
                        <label for="energy-penalty">Pénalité d'énergie</label>
                        <input type="range" id="energy-penalty" min="1" max="3" step="1" value="2">
                        <div class="slider-labels">
                            <span>Faible</span>
                            <span>Moyen</span>
                            <span>Fort</span>
                        </div>
                    </div>

                    <div class="parameter-group">
                        <label for="shake-penalty">Pénalité de tremblement</label>
                        <input type="range" id="shake-penalty" min="1" max="3" step="1" value="2">
                        <div class="slider-labels">
                            <span>Faible</span>
                            <span>Moyen</span>
                            <span>Fort</span>
                        </div>
                    </div>
                </div>

                <div class="navigation-controls">
                    <button class="btn-secondary" onclick="window.history.back()">RETOUR</button>
                </div>
            </div>
        </div>
    </div>
    <script src="particles.js"></script>
</body>
</html>
